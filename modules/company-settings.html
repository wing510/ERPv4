<!-- ===== Company Profile 公司資料 ===== -->

<div class="card">

  <div class="card-header card-header-flex">

    <span>

      Company Profile 公司資料

      <button type="button" class="btn-sheet" onclick="openSheetLink('erp_company_profile')" title="公司資料（erp_company_profile）">Sheet</button>

    </span>

    <span data-help="companyProfile"></span>

  </div>

  <div class="card-body" id="companyProfileCardBody">

    <div class="form-grid-4" id="companyProfileFormGrid">

      <div class="form-group" style="grid-column:span 2;">

        <label>公司 中文</label>

        <input type="text" id="cp_company_name_zh" placeholder="鼎立生技股份有限公司">

      </div>

      <div class="form-group" style="grid-column:span 2;">

        <label>公司 English *</label>

        <input type="text" id="cp_company_name_en" placeholder="DINGLI BIOTECH CO., LTD.">

      </div>



      <div class="form-group" style="grid-column:span 2;">

        <label>地址 中文</label>

        <input type="text" id="cp_address_zh">

      </div>

      <div class="form-group" style="grid-column:span 2;">

        <label>地址 English *</label>

        <input type="text" id="cp_address_en">

      </div>



      <div class="form-group">

        <label>城市 中文</label>

        <input type="text" id="cp_city_zh" placeholder="新北市">

      </div>

      <div class="form-group">

        <label>城市 English</label>

        <input type="text" id="cp_city_en" placeholder="New Taipei City">

      </div>

      <div class="form-group">

        <label>國家 中文</label>

        <input type="text" id="cp_country_zh" value="台灣">

      </div>

      <div class="form-group">

        <label>國家 English</label>

        <input type="text" id="cp_country_en" value="Taiwan">

      </div>



      <div class="form-group">

        <label>郵遞區號 Postal Code</label>

        <input type="text" id="cp_postal_code">

      </div>

      <div class="form-group">

        <label>統編／稅號 Tax ID</label>

        <input type="text" id="cp_tax_id">

      </div>

      <div class="form-group">

        <label>電話 Phone</label>

        <input type="text" id="cp_phone">

      </div>

      <div class="form-group">

        <label>電子郵件 Email</label>

        <input type="text" id="cp_email">

      </div>

      <div class="form-group">

        <label>預設幣別 Default Currency</label>

        <select id="cp_default_currency">

          <option value="USD">USD</option>

          <option value="TWD">TWD</option>

          <option value="CNY">CNY</option>

          <option value="EUR">EUR</option>

        </select>

      </div>

      <div class="form-group">

        <label>預設原產地 Default Country</label>

        <input type="text" id="cp_default_origin" value="Taiwan">

      </div>

      <div class="form-group">

        <label>預設貿易條件 Default Incoterms</label>

        <input type="text" id="cp_default_incoterms" placeholder="FOB">

      </div>

      <div class="form-group" style="grid-column:span 2;">

        <label>預設聲明 Default Declaration</label>

        <input type="text" id="cp_declaration_text" value="I declare that the information is true and correct.">

      </div>

      <div class="form-group form-group-span-2">

        <label>備註 Remark</label>

        <input type="text" id="cp_remark">

      </div>

    </div>

    <div class="form-grid-4 company-profile-finance-grid" id="companyProfileFinanceGrid" style="margin-top:16px;padding-top:16px;border-top:1px solid #e2e8f0;">
      <div class="form-group full-width">
        <label style="font-weight:600;color:#334155;">財務／收款提醒</label>
      </div>
      <div class="form-group">
        <label>一般銷售逾期門檻（天）</label>
        <input type="number" id="cp_ar_overdue_days_normal" min="0" step="1" value="14">
        <div style="font-size:11px;color:#64748b;margin-top:4px;">起算日＋N 天後算逾期</div>
      </div>
      <div class="form-group">
        <label>寄賣逾期門檻（天）</label>
        <input type="number" id="cp_ar_overdue_days_consignment" min="0" step="1" value="30">
        <div style="font-size:11px;color:#64748b;margin-top:4px;">結算日＋N 天後算逾期</div>
      </div>
      <div class="form-group">
        <label>到期前提醒（天）</label>
        <input type="number" id="cp_ar_reminder_days_before_overdue" min="0" step="1" value="5">
        <div style="font-size:11px;color:#64748b;margin-top:4px;">0＝關閉；例：5＝逾期前 5 天起提醒</div>
      </div>
    </div>

    <div class="button-group" id="companyProfileEditActions">

      <button class="btn-primary" type="button" id="cpSaveBtn" onclick="saveCompanyProfile(this)">儲存</button>

      <button class="btn-secondary" type="button" onclick="loadCompanyProfileForm()">重新載入</button>

    </div>

  </div>

</div>



<!-- ===== Supabase 資料庫備份（僅 CEO／GA／ADMIN） ===== -->

<div class="card" id="cpBackupCard" style="display:none;">

  <div class="card-header card-header-flex">

    <span>Supabase 資料庫備份</span>

    <span data-help="supabaseBackup"></span>

  </div>

  <div class="card-body" style="padding-top:12px;">

    <div class="button-group" style="margin:0;">

      <button class="btn-secondary" type="button" id="cpBackupBtn" onclick="triggerCompanySupabaseBackup(this)">立即備份</button>

      <button class="btn-secondary" type="button" id="cpBackupRefreshBtn" onclick="loadCompanyBackupList()">重新整理</button>

      <span id="cpBackupStatus" class="text-muted" style="margin-left:10px;font-size:13px;"></span>
      <style>
        #cpBackupStatus.cp-backup-restoring {
          color: #c2410c;
          font-weight: 600;
        }
      </style>

    </div>

    <div class="cp-backup-table-wrap" style="margin-top:10px;">

      <table class="data-table cp-backup-table" id="cpBackupTable">

        <colgroup>
          <col class="col-backup-c-time">
          <col class="col-backup-c-filename-desk">
          <col class="col-backup-c-size">
          <col class="col-backup-c-kind">
          <col class="col-backup-c-action">
        </colgroup>

        <thead>

          <tr>

            <th class="col-backup-timefile"><span class="cp-backup-th-time-desk">時間</span><span class="cp-backup-th-timefile-mob">時間</span></th>

            <th class="col-backup-filename-desk">檔名</th>

            <th class="col-backup-size">大小</th>

            <th class="col-backup-kind">方式</th>

            <th class="col-backup-action">操作</th>

          </tr>

        </thead>

        <tbody id="cpBackupTableBody">

          <tr><td colspan="5" class="text-muted">載入中…</td></tr>

        </tbody>

      </table>

    </div>

  </div>

</div>

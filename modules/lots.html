<div class="card">

  <div class="card-header card-header-flex">
    <div>
      Lots 批次QA管理
      <button type="button" class="btn-sheet" onclick="openSheetLink('lot')" title="在 Google Sheets 開啟對應工作表">Sheet</button>
      <span id="lotsHeaderHint" style="font-size:12px;color:#64748b;font-weight:500;margin-left:10px;">批次狀態：載入中…</span>
      <span id="lotsQaHint" style="font-size:12px;color:#64748b;font-weight:500;margin-left:10px;">QA概況：載入中…</span>
    </div>
    <span data-help="lotsMain"></span>
  </div>

  <div class="card-body">

    <!-- 🔍 搜尋區 -->
    <div class="search-toolbar" style="margin-bottom:20px;">

      <input type="text" id="search_lots_keyword" class="search-keyword" placeholder="搜尋關鍵字" aria-label="搜尋關鍵字">

      <select id="search_inventory_status">
        <option value="">全部庫存狀態</option>
        <option value="ACTIVE" selected>🟢 ACTIVE（可使用）</option>
        <option value="CLOSED">🟠 CLOSED（無庫存）</option>
        <option value="VOID">🔴 VOID（已過期）</option>
      </select>

      <select id="search_inspection_status">
        <option value="">全部品檢狀態</option>
        <option value="PENDING">PENDING（待QA）</option>
        <option value="APPROVED">APPROVED（QA已放行）</option>
        <option value="REJECTED">REJECTED（QA已退回）</option>
      </select>
      <button class="btn-secondary" onclick="erpResetCurrentModule_()">重設</button>
      <button type="button" id="lotsRebuildBalanceBtn" class="btn-secondary" style="display:none;margin-left:6px;" title="由 inventory_movement 全表重算 lot_balance 快照（僅 ADMIN）" onclick="lotsRebuildBalanceClick()">重建庫存快照</button>

    </div>

    <div id="lotsActionToolbar" class="lots-action-toolbar button-group" style="margin-bottom:12px;">
      <button type="button" id="lotsBtnApprove" class="btn-primary" disabled onclick="lotsToolbarApprove_()">QA 放行</button>
      <button type="button" id="lotsBtnReject" class="btn-secondary" disabled onclick="lotsToolbarReject_()">QA 退回</button>
      <button type="button" id="lotsBtnEditDates" class="btn-secondary" disabled onclick="lotsToolbarEditDates_()">補登資料</button>
      <button type="button" id="lotsBtnLog" class="btn-secondary" disabled onclick="lotsToolbarLog_()">Log</button>
      <button type="button" id="lotsBtnTrace" class="btn-secondary" disabled onclick="lotsToolbarTrace_()">追溯</button>
    </div>

    <!-- 📋 表格（欄寬由 .table-lots-list + colgroup 控制；窄螢幕可橫向捲動） -->
    <p class="lots-list-narrow-hint">欄位較多時，請左右滑動表格以檢視日期與操作。</p>
    <div class="table-wrapper table-wrapper-tall table-wrapper-master table-lots-list">

      <table class="data-table">
        <colgroup>
          <col class="col-lots-sel" />
          <col class="col-lots-id" />
          <col class="col-lots-wh" />
          <col class="col-lots-qty" />
          <col class="col-lots-av" />
          <col class="col-lots-dates" />
          <col class="col-lots-factory" />
          <col class="col-lots-inv" />
          <col class="col-lots-qa" />
        </colgroup>
        <thead>
          <tr>
            <th class="lots-col-select" title="單選">✓</th>
            <th>Lot ID／產品（規格）</th>
            <th>倉別</th>
            <th title="收貨／建檔時寫入 lot.qty，僅供對照，不作扣庫依據">原始</th>
            <th title="inventory_movement 加總；無流水顯示 --">可用</th>
            <th>製造／有效</th>
            <th title="委外加工產出必填；寄賣收回用標籤批號">加工廠 Lot</th>
            <th>庫存狀態</th>
            <th>品檢狀態</th>
          </tr>
        </thead>

        <tbody id="lotsTableBody"></tbody>

      </table>

    </div>

  </div>

</div>

<!-- QA 操作確認視窗 -->
<div id="lotsQaConfirmModal" class="lots-qa-modal" style="display:none;" role="dialog" aria-modal="true">
  <div class="lots-qa-modal-overlay" onclick="closeLotsQaConfirm()"></div>
  <div class="lots-qa-modal-dialog">
    <h3 id="qaConfirmTitle" class="lots-qa-modal-title"></h3>
    <div id="qaConfirmBatchInfo" class="lots-qa-modal-batch"></div>
    <div id="qaConfirmImpact" class="lots-qa-modal-impact"></div>
    <div class="lots-qa-modal-actions button-group">
      <button type="button" id="qaConfirmPrimary" class="btn-primary">確認</button>
      <button type="button" id="qaConfirmCancel" class="btn-secondary" onclick="closeLotsQaConfirm()">取消</button>
    </div>
  </div>
</div>

<!-- Lot 日期補登視窗 -->
<div id="lotsDateModal" class="lots-qa-modal" style="display:none;" role="dialog" aria-modal="true">
  <div class="lots-qa-modal-overlay" onclick="closeLotDateModal()"></div>
  <div class="lots-qa-modal-dialog">
    <h3 class="lots-qa-modal-title">補登批次資料</h3>
    <div id="lotDateBatchInfo" class="lots-qa-modal-batch"></div>
    <div style="display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:18px;">
      <div class="form-group" style="margin:0;">
        <label for="lotDateFactoryLot">加工廠 Lot<span id="lotDateFactoryLotReq" style="display:none;"> *</span></label>
        <input type="text" id="lotDateFactoryLot" placeholder="委外加工產出必填；其他來源選填">
      </div>
      <div class="form-group" style="margin:0;">
        <label for="lotDateManufacture">製造日</label>
        <input type="date" id="lotDateManufacture">
      </div>
      <div class="form-group" style="margin:0;">
        <label for="lotDateExpiry">有效期</label>
        <input type="date" id="lotDateExpiry">
      </div>
      <div style="font-size:12px;color:#64748b;">規則：有效期不可早於製造日。</div>
    </div>
    <div class="lots-qa-modal-actions">
      <button type="button" id="lotDateSaveBtn" class="btn-primary" onclick="saveLotDatesFromModal(this)">儲存</button>
      <button type="button" class="btn-secondary" onclick="closeLotDateModal()">取消</button>
    </div>
  </div>
</div>
<style>
.lots-qa-modal { position:fixed; inset:0; z-index:9000; display:flex; align-items:center; justify-content:center; padding:16px; }
.lots-qa-modal-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.4); }
.lots-qa-modal-dialog { position:relative; background:#fff; border-radius:10px; box-shadow:0 8px 32px rgba(0,0,0,0.2); max-width:420px; width:100%; padding:24px; }
.lots-qa-modal-title { margin:0 0 16px; font-size:18px; color:#1e293b; }
.lots-qa-modal-batch { margin-bottom:12px; padding:12px; background:#f1f5f9; border-radius:6px; font-size:14px; line-height:1.6; color:#475569; }
.lots-qa-modal-impact { margin-bottom:20px; font-size:14px; color:#0f766e; line-height:1.6; }
.lots-qa-modal-actions { display:flex; gap:10px; justify-content:flex-end; }

.lots-action-toolbar{ display:flex; flex-wrap:wrap; align-items:center; gap:8px; }
.lots-col-select{ width:36px; text-align:center; vertical-align:middle; }
.lots-mfg-exp-cell{ line-height:1.3; min-width:0; }
.lots-mfg-exp-mfg{ font-size:12px; color:#64748b; }
.lots-mfg-exp-exp{ font-size:12px; color:#1e293b; }
.table-wrapper.table-lots-list .data-table .lots-col-dates{
  min-width:86px;
  max-width:104px;
  overflow:hidden;
  vertical-align:middle;
}
.table-wrapper.table-lots-list .data-table .lots-col-factory{
  min-width:64px;
  word-break:break-all;
  vertical-align:middle;
}

.lots-status-light{
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-weight:600;
}
.lots-status-light::before{
  content:"";
  width:8px;
  height:8px;
  border-radius:50%;
  background:#94a3b8;
  box-shadow:0 0 0 2px rgba(148,163,184,0.2);
}
.lots-status-light-active::before{
  background:#22c55e;
  box-shadow:0 0 0 2px rgba(34,197,94,0.2);
}
.lots-status-light-closed::before{
  background:#f59e0b;
  box-shadow:0 0 0 2px rgba(245,158,11,0.2);
}
.lots-status-light-void::before{
  background:#ef4444;
  box-shadow:0 0 0 2px rgba(239,68,68,0.2);
}
</style>

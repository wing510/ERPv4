<div class="card">
  <div class="card-header card-header-flex">
    <span>
      Movements 庫存異動
      <button type="button" class="btn-sheet" onclick="openSheetLink('inventory_movement')" title="在 Google Sheets 開啟對應工作表">Sheet</button>
      <span id="mvHeaderHint" style="font-size:12px;color:#64748b;font-weight:500;margin-left:10px;">資料狀態：載入中…</span>
      <span id="mvLotHint" style="font-size:12px;color:#64748b;font-weight:500;margin-left:10px;">Lot 下拉：載入中…</span>
    </span>
    <span data-help="movementsMain"></span>
  </div>

  <div class="card-body">
    <div class="mv-editor-row">
      <div class="mv-editor-fields mv-editor-fields-full mv-row-lot">
        <div class="form-group">
          <div style="display:grid;grid-template-columns:72px 1fr;gap:8px 10px;align-items:center;">
            <div></div>
            <label style="margin:0;">選擇 Lot *</label>
            <label style="display:inline-flex;align-items:center;gap:6px;margin:0;white-space:nowrap;">
              <input type="checkbox" id="mv_is_transfer">轉倉
            </label>
            <select id="mv_lot" style="min-width:260px;"></select>
          </div>
        </div>
      </div>

      <div class="mv-editor-fields mv-editor-fields-full mv-row-meta" style="margin-top:10px;">
        <div class="form-group">
          <label>用途 *</label>
          <select id="mv_purpose">
            <option value="">請選擇</option>
            <option value="INTERNAL_USE">內部領用</option>
            <option value="SAMPLE">樣品</option>
            <option value="SCRAP">報廢</option>
            <option value="OTHER">其他</option>
          </select>
        </div>

        <div class="form-group">
          <label>給誰（領用／交付） *</label>
          <select id="mv_issued_to">
            <option value="">請選擇</option>
          </select>
        </div>

        <div class="form-group">
          <label>扣庫數量 *</label>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
            <div class="erp-input-with-suffix" style="flex:1;min-width:140px;">
              <input type="number" id="mv_qty" placeholder="數量" min="0" step="0.01">
              <span id="mv_qty_unit_suffix" class="erp-input-suffix"></span>
            </div>
            <input type="hidden" id="mv_lot_unit" value="">
            <button type="button" class="btn-secondary" id="mv_transfer_all_btn" onclick="mvFillTransferAllQty_()" title="轉倉模式：一鍵帶入『全部可用量』" style="white-space:nowrap;">轉全部</button>
          </div>
        </div>

        <div class="form-group">
          <label>轉倉到</label>
          <select id="mv_transfer_wh">
            <option value="">請選擇</option>
          </select>
        </div>

        <div class="form-group" style="grid-column:1/-1;">
          <label>原因 *</label>
          <input type="text" id="mv_remark">
        </div>
      </div>

      <div class="button-group mv-button-group">
        <button class="btn-primary" id="mv_create_btn" onclick="createMovement(this)">確認扣庫</button>
        <button class="btn-primary" id="mv_transfer_btn" onclick="transferMovement(this)">轉倉</button>
        <button class="btn-secondary" type="button" onclick="clearMovementForm()">清除</button>
        <button class="btn-secondary" onclick="movementsInit()">重新整理</button>
        <button class="btn-secondary" onclick="openLogs('inventory_movement','', 'inventory')">Log</button>
      </div>
    </div>

    <br>

    <div class="search-toolbar" style="margin-bottom:12px;">
      <input type="text" id="mv_search_keyword" class="search-keyword" placeholder="搜尋關鍵字" aria-label="搜尋關鍵字">
      <select id="mv_filter_movement_type" title="依異動類型篩選列表">
        <option value="">全部異動類型</option>
        <option value="IN">IN（入庫）</option>
        <option value="OUT">OUT（手動扣庫）</option>
        <option value="ADJUST">ADJUST（調整）</option>
        <option value="SHIP_OUT">SHIP_OUT（出貨扣庫）</option>
        <option value="PROCESS_OUT">PROCESS_OUT（加工扣庫）</option>
        <option value="PROCESS_IN">PROCESS_IN（加工入庫）</option>
      </select>
      <button type="button" class="btn-secondary" onclick="resetMvListSearch()">重設</button>
    </div>

    <div class="table-wrapper table-wrapper-tall table-wrapper-master">
      <table class="data-table">
        <thead>
          <tr>
            <th>Lot ID／產品（規格）</th>
            <th>倉別</th>
            <th>異動類型</th>
            <th>數量</th>
            <th>時間</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="movementTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

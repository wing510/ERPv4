<div class="card">
  <div class="card-header card-header-flex">
    <span>
      Warehouses 倉庫
      <button type="button" class="btn-sheet" onclick="openSheetLink('warehouse')" title="在 Google Sheets 開啟對應工作表">Sheet</button>
    </span>
    <span data-help="warehouseList"></span>
  </div>

  <div class="card-body">
    <div class="search-toolbar search-toolbar-master">
      <input type="text" id="search_wh_keyword" class="search-keyword" placeholder="搜尋關鍵字" aria-label="搜尋關鍵字">
      <select id="search_wh_category">
        <option value="">全部類別</option>
        <option value="AMBIENT">AMBIENT（常溫）</option>
        <option value="CHILLED">CHILLED（冷藏）</option>
        <option value="FROZEN">FROZEN（冷凍）</option>
      </select>
      <select id="search_wh_status">
        <option value="">全部狀態</option>
        <option value="ACTIVE" selected>ACTIVE（使用中）</option>
        <option value="INACTIVE">INACTIVE（停用）</option>
      </select>
      <button class="btn-secondary" onclick="resetWarehouseSearch()">重設</button>
      <button type="button" class="btn-primary" onclick="newMasterFromList_('warehouse_edit_card', clearWarehouseForm)">新增</button>
    </div>

    <br>

    <div class="table-wrapper table-wrapper-master">
      <table class="data-table master-list-table">
        <thead>
          <tr>
            <th class="col-master-idname"><span class="master-th-id-desk">倉庫ID</span><span class="master-th-idname-mob">ID/名稱</span></th>
            <th class="col-master-name-desk">名稱</th>
            <th>類別</th>
            <th class="col-wh-address-desk">地址</th>
            <th class="col-status">狀態</th>
          </tr>
        </thead>
        <tbody id="whTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ===== Warehouses 倉庫主檔 ===== -->
<div class="card master-edit-card master-edit-collapsed" id="warehouse_edit_card">
  <div class="card-header card-header-flex">
    <span>
      倉庫明細
      <button type="button" class="btn-sheet" onclick="openSheetLink('warehouse')" title="在 Google Sheets 開啟對應工作表">Sheet</button>
    </span>
    <span data-help="warehouseMain"></span>
  </div>

  <div class="card-body">
    <div class="form-grid-4">
      <div class="form-group">
        <label>倉庫ID *</label>
        <input type="text" id="wh_id" placeholder="自動產生ID">
      </div>

      <div class="form-group">
        <label>倉庫名稱 *</label>
        <input type="text" id="wh_name" placeholder="例如：主倉">
      </div>

      <div class="form-group">
        <label>類別 *</label>
        <select id="wh_category">
          <option value="">請選擇</option>
          <option value="AMBIENT">AMBIENT（常溫）</option>
          <option value="CHILLED">CHILLED（冷藏）</option>
          <option value="FROZEN">FROZEN（冷凍）</option>
        </select>
      </div>

      <div class="form-group">
        <label>狀態</label>
        <div class="erp-status-select-row">
          <select id="wh_status">
            <option value="ACTIVE" selected>ACTIVE（使用中）</option>
            <option value="INACTIVE">INACTIVE（停用）</option>
          </select>
          <span id="wh_status_lamp" class="status-lamp status-lamp--solo status-lamp--active" role="img" title="ACTIVE（使用中）" aria-label="ACTIVE（使用中）"><span class="status-lamp-dot" aria-hidden="true"></span></span>
        </div>
      </div>

      <div class="form-group form-group-span-2">
        <label>倉庫地址</label>
        <input type="text" id="wh_address">
      </div>

      <div class="form-group form-group-span-2">
        <label>備註</label>
        <input type="text" id="wh_remark">
      </div>
    </div>

    <div class="button-group">
      <button class="btn-primary" id="wh_create_btn" onclick="createWarehouse(this)">建立</button>
      <button class="btn-secondary" id="wh_update_btn" onclick="updateWarehouse(this)">更新</button>
      <button class="btn-secondary" onclick="clearWarehouseForm()">清除</button>
      <button class="btn-secondary" onclick="openLogs('warehouse', document.getElementById('wh_id')?.value || '', 'master')">Log</button>
    </div>
  </div>
</div>

<!-- ===== Merge 合批 ===== -->
<div class="card">
  <div class="card-header card-header-flex">
    <span>
      Merge 合批
      <button type="button" class="btn-sheet" onclick="openSheetLink('lot_relation')" title="批次關聯（lot_relation）">Sheet</button>
    </span>
    <span data-help="mergeMain"></span>
  </div>

  <div class="card-body">
    <div class="form-grid-4">
      <div class="form-group">
        <label>新 Lot ID *</label>
        <input type="text" id="merge_new_lot_id" placeholder="自動產生ID">
      </div>
      <div class="form-group">
        <label>合批產品（自動）</label>
        <input type="text" id="merge_product" readonly>
      </div>
      <div class="form-group">
        <label>單位（自動）</label>
        <input type="text" id="merge_unit" readonly>
      </div>
      <div class="form-group">
        <label>合批總量</label>
        <input type="text" id="merge_total" readonly>
      </div>
      <div class="form-group form-group-span-2">
        <label>備註</label>
        <input type="text" id="merge_remark">
      </div>
    </div>

    <div class="button-group">
      <button class="btn-secondary" onclick="resetMerge()">清除</button>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-header card-header-flex">
    <span>來源 Lots（僅限 QA已放行）</span>
    <span data-help="mergeMain"></span>
  </div>
  <div class="card-body">
    <div class="form-grid-4">
      <div class="form-group">
        <label>來源 Lot *</label>
        <select id="merge_source_lot" onchange="onSelectMergeSource()"></select>
      </div>
      <div class="form-group">
        <label>可用量</label>
        <input type="text" id="merge_available" readonly>
      </div>
      <div class="form-group">
        <label>取用數量 *</label>
        <div class="erp-input-with-suffix">
          <input type="number" id="merge_take_qty" min="0" step="0.01">
          <span id="merge_take_unit_suffix" class="erp-input-suffix"></span>
        </div>
        <input type="hidden" id="merge_take_unit" value="">
      </div>
      <div class="form-group form-group-span-2">
        <label>備註</label>
        <input type="text" id="merge_take_remark">
      </div>
    </div>

    <div class="button-group">
      <button class="btn-primary" id="merge_add_btn" onclick="addMergeDraft()">新增來源</button>
    </div>

    <br>

    <div class="table-wrapper">
      <table class="data-table">
        <thead>
          <tr>
            <th>#</th>
            <th>來源 Lot</th>
            <th>產品</th>
            <th>數量</th>
            <th>備註</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="mergeBody"></tbody>
      </table>
    </div>

    <div class="button-group" id="mergePostButtonGroup" style="margin-top:10px;">
      <button class="btn-primary" id="merge_post_btn" onclick="postMerge(this)">確認合批（過帳）</button>
      <button type="button" class="btn-secondary" onclick="scrollToEditorTop()">回到上方</button>
    </div>
  </div>
</div>
